server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to the orchestrator service on the compose network.
  location /api/ {
    proxy_pass http://orchestrator:3333;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Server-Sent Events: disable buffering and keep the connection open.
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 24h;
    chunked_transfer_encoding off;
  }

  location = /health {
    proxy_pass http://orchestrator:3333/health;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
