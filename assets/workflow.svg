<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wfbg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1224"/>
      <stop offset="0.5" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#070a14"/>
    </linearGradient>
    <radialGradient id="wfglow" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#5b6bff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wfline" x1="120" y1="0" x2="1160" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.4" stop-color="#38bdf8"/>
      <stop offset="0.7" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="nIndigo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.4" stop-color="#c7d2fe"/><stop offset="1" stop-color="#6366f1"/>
    </radialGradient>
    <radialGradient id="nCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.4" stop-color="#bae6fd"/><stop offset="1" stop-color="#0ea5e9"/>
    </radialGradient>
    <radialGradient id="nAmber" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.4" stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>
    <radialGradient id="nViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.4" stop-color="#e9d5ff"/><stop offset="1" stop-color="#a855f7"/>
    </radialGradient>
    <filter id="wfsoft" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8ea0d8"/>
    </marker>
  </defs>

  <rect width="1280" height="360" fill="url(#wfbg)"/>
  <rect width="1280" height="360" fill="url(#wfglow)"/>

  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="150" y="52" font-size="15" font-weight="700" letter-spacing="3" fill="#7c89b8">THE DEFAULT WORKFLOW &#8212; A DAG YOU OWN</text>

    <!-- connecting edges -->
    <g stroke="url(#wfline)" stroke-width="3" opacity="0.85">
      <line x1="182" y1="176" x2="363" y2="176" marker-end="url(#arrow)"/>
      <line x1="427" y1="176" x2="608" y2="176" marker-end="url(#arrow)"/>
      <line x1="672" y1="176" x2="853" y2="176" marker-end="url(#arrow)"/>
      <line x1="917" y1="176" x2="1098" y2="176" marker-end="url(#arrow)"/>
    </g>

    <!-- node 1: investigate -->
    <g>
      <text x="150" y="118" font-size="13" font-weight="600" letter-spacing="1.5" fill="#5f6b93" text-anchor="middle">INVESTIGATING</text>
      <circle cx="150" cy="176" r="22" fill="url(#nIndigo)" filter="url(#wfsoft)"/>
      <text x="150" y="238" font-size="21" font-weight="700" fill="#eef2ff" text-anchor="middle">investigate</text>
      <text x="150" y="266" font-size="14" font-weight="500" fill="#818cf8" text-anchor="middle">agent</text>
    </g>
    <!-- node 2: implement -->
    <g>
      <text x="395" y="118" font-size="13" font-weight="600" letter-spacing="1.5" fill="#5f6b93" text-anchor="middle">IN_PROGRESS</text>
      <circle cx="395" cy="176" r="22" fill="url(#nIndigo)" filter="url(#wfsoft)"/>
      <text x="395" y="238" font-size="21" font-weight="700" fill="#eef2ff" text-anchor="middle">implement</text>
      <text x="395" y="266" font-size="14" font-weight="500" fill="#818cf8" text-anchor="middle">agent</text>
    </g>
    <!-- node 3: verify -->
    <g>
      <text x="640" y="118" font-size="13" font-weight="600" letter-spacing="1.5" fill="#5f6b93" text-anchor="middle">IN_PROGRESS</text>
      <circle cx="640" cy="176" r="22" fill="url(#nCyan)" filter="url(#wfsoft)"/>
      <text x="640" y="238" font-size="21" font-weight="700" fill="#eef2ff" text-anchor="middle">verify</text>
      <text x="640" y="266" font-size="14" font-weight="500" fill="#38bdf8" text-anchor="middle">shell</text>
    </g>
    <!-- node 4: approval -->
    <g>
      <text x="885" y="118" font-size="13" font-weight="600" letter-spacing="1.5" fill="#5f6b93" text-anchor="middle">REVIEW</text>
      <circle cx="885" cy="176" r="22" fill="url(#nAmber)" filter="url(#wfsoft)"/>
      <text x="885" y="238" font-size="21" font-weight="700" fill="#eef2ff" text-anchor="middle">approval</text>
      <text x="885" y="266" font-size="14" font-weight="500" fill="#fbbf24" text-anchor="middle">human gate</text>
    </g>
    <!-- node 5: open_pr -->
    <g>
      <text x="1130" y="118" font-size="13" font-weight="600" letter-spacing="1.5" fill="#5f6b93" text-anchor="middle">DONE</text>
      <circle cx="1130" cy="176" r="22" fill="url(#nViolet)" filter="url(#wfsoft)"/>
      <text x="1130" y="238" font-size="21" font-weight="700" fill="#eef2ff" text-anchor="middle">open_pr</text>
      <text x="1130" y="266" font-size="14" font-weight="500" fill="#c084fc" text-anchor="middle">scm</text>
    </g>

    <text x="640" y="322" font-size="15" font-weight="400" fill="#6b779e" text-anchor="middle">Each node runs in an isolated git worktree &#183; events stream live to the board &#183; the run pauses at every human gate</text>
  </g>
</svg>
