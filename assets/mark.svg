<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141b30"/>
      <stop offset="0.55" stop-color="#0d1324"/>
      <stop offset="1" stop-color="#080b16"/>
    </linearGradient>
    <radialGradient id="glowbg" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#5b6bff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge" x1="120" y1="120" x2="360" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="star" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#818cf8"/>
    </radialGradient>
    <radialGradient id="starBelt" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#e9d5ff"/>
      <stop offset="1" stop-color="#c084fc"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softLine" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>

  <rect x="8" y="8" width="496" height="496" rx="116" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="116" fill="url(#glowbg)"/>
  <rect x="8.75" y="8.75" width="494.5" height="494.5" rx="115.25" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- faint background stars -->
  <g fill="#c7d2fe">
    <circle cx="96" cy="120" r="1.6" opacity="0.5"/>
    <circle cx="420" cy="96" r="2" opacity="0.6"/>
    <circle cx="150" cy="330" r="1.4" opacity="0.4"/>
    <circle cx="392" cy="300" r="1.6" opacity="0.45"/>
    <circle cx="112" cy="420" r="1.8" opacity="0.5"/>
    <circle cx="360" cy="130" r="1.3" opacity="0.4"/>
    <circle cx="250" cy="72" r="1.5" opacity="0.5"/>
    <circle cx="440" cy="400" r="1.5" opacity="0.45"/>
    <circle cx="70" cy="250" r="1.4" opacity="0.4"/>
  </g>

  <!-- constellation edges (the DAG) -->
  <g stroke="url(#edge)" stroke-width="4" stroke-linecap="round" filter="url(#softLine)" opacity="0.9">
    <path d="M256 120 L176 176"/>
    <path d="M256 120 L344 190"/>
    <path d="M176 176 L214 262"/>
    <path d="M344 190 L298 286"/>
    <path d="M214 262 L256 274"/>
    <path d="M256 274 L298 286"/>
    <path d="M214 262 L198 384"/>
    <path d="M298 286 L336 396"/>
  </g>
  <g stroke="url(#edge)" stroke-width="2" stroke-linecap="round">
    <path d="M256 120 L176 176"/>
    <path d="M256 120 L344 190"/>
    <path d="M176 176 L214 262"/>
    <path d="M344 190 L298 286"/>
    <path d="M214 262 L256 274"/>
    <path d="M256 274 L298 286"/>
    <path d="M214 262 L198 384"/>
    <path d="M298 286 L336 396"/>
  </g>

  <!-- star nodes -->
  <g filter="url(#soft)">
    <circle cx="256" cy="120" r="6" fill="url(#star)"/>
    <circle cx="176" cy="176" r="13" fill="url(#star)"/>
    <circle cx="344" cy="190" r="9" fill="url(#star)"/>
    <circle cx="214" cy="262" r="8" fill="url(#starBelt)"/>
    <circle cx="256" cy="274" r="10" fill="url(#starBelt)"/>
    <circle cx="298" cy="286" r="8" fill="url(#starBelt)"/>
    <circle cx="198" cy="384" r="8" fill="url(#star)"/>
    <circle cx="336" cy="396" r="13" fill="url(#star)"/>
  </g>
</svg>
