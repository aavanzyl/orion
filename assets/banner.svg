<svg width="1280" height="448" viewBox="0 0 1280 448" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1280" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c1224"/>
      <stop offset="0.5" stop-color="#0a0f1f"/>
      <stop offset="1" stop-color="#070a14"/>
    </linearGradient>
    <radialGradient id="bglow" cx="0.28" cy="0.5" r="0.55">
      <stop offset="0" stop-color="#5b6bff" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#7c3aed" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bglow2" cx="0.9" cy="0.15" r="0.5">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bedge" x1="180" y1="90" x2="470" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="wordfill" x1="560" y1="150" x2="560" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c7d2fe"/>
    </linearGradient>
    <radialGradient id="bstar" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#818cf8"/>
    </radialGradient>
    <radialGradient id="bstarBelt" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#e9d5ff"/>
      <stop offset="1" stop-color="#c084fc"/>
    </radialGradient>
    <filter id="bsoft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bsoftLine" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
    <filter id="wordglow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <rect width="1280" height="448" fill="#0a0f1f"/>
  <rect width="1280" height="448" fill="url(#bbg)"/>
  <rect width="1280" height="448" fill="url(#bglow)"/>
  <rect width="1280" height="448" fill="url(#bglow2)"/>

  <!-- scattered stars -->
  <g fill="#c7d2fe">
    <circle cx="640" cy="60" r="1.6" opacity="0.6"/>
    <circle cx="720" cy="120" r="1.2" opacity="0.5"/>
    <circle cx="880" cy="80" r="2" opacity="0.6"/>
    <circle cx="980" cy="180" r="1.4" opacity="0.5"/>
    <circle cx="1120" cy="90" r="1.8" opacity="0.6"/>
    <circle cx="1180" cy="230" r="1.4" opacity="0.5"/>
    <circle cx="1040" cy="360" r="1.6" opacity="0.5"/>
    <circle cx="820" cy="380" r="1.3" opacity="0.45"/>
    <circle cx="700" cy="330" r="1.5" opacity="0.5"/>
    <circle cx="60" cy="60" r="1.5" opacity="0.5"/>
    <circle cx="120" cy="400" r="1.6" opacity="0.5"/>
    <circle cx="520" cy="410" r="1.4" opacity="0.45"/>
    <circle cx="470" cy="70" r="1.3" opacity="0.45"/>
  </g>

  <!-- constellation on the left -->
  <g transform="translate(60, 24) scale(0.78)">
    <g stroke="url(#bedge)" stroke-width="4" stroke-linecap="round" filter="url(#bsoftLine)" opacity="0.9">
      <path d="M256 120 L176 176"/>
      <path d="M256 120 L344 190"/>
      <path d="M176 176 L214 262"/>
      <path d="M344 190 L298 286"/>
      <path d="M214 262 L256 274"/>
      <path d="M256 274 L298 286"/>
      <path d="M214 262 L198 384"/>
      <path d="M298 286 L336 396"/>
    </g>
    <g stroke="url(#bedge)" stroke-width="2" stroke-linecap="round">
      <path d="M256 120 L176 176"/>
      <path d="M256 120 L344 190"/>
      <path d="M176 176 L214 262"/>
      <path d="M344 190 L298 286"/>
      <path d="M214 262 L256 274"/>
      <path d="M256 274 L298 286"/>
      <path d="M214 262 L198 384"/>
      <path d="M298 286 L336 396"/>
    </g>
    <g filter="url(#bsoft)">
      <circle cx="256" cy="120" r="6" fill="url(#bstar)"/>
      <circle cx="176" cy="176" r="13" fill="url(#bstar)"/>
      <circle cx="344" cy="190" r="9" fill="url(#bstar)"/>
      <circle cx="214" cy="262" r="8" fill="url(#bstarBelt)"/>
      <circle cx="256" cy="274" r="10" fill="url(#bstarBelt)"/>
      <circle cx="298" cy="286" r="8" fill="url(#bstarBelt)"/>
      <circle cx="198" cy="384" r="8" fill="url(#bstar)"/>
      <circle cx="336" cy="396" r="13" fill="url(#bstar)"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="470" y="214" font-size="132" font-weight="800" letter-spacing="6" fill="#a855f7" opacity="0.35" filter="url(#wordglow)">ORION</text>
    <text x="470" y="214" font-size="132" font-weight="800" letter-spacing="6" fill="url(#wordfill)">ORION</text>
    <text x="474" y="266" font-size="27" font-weight="600" letter-spacing="0.3" fill="#a5b4fc">The workflow owns the process. The agent owns the reasoning.</text>
    <text x="474" y="308" font-size="20" font-weight="400" letter-spacing="0.2" fill="#8ea0c9">A deterministic engine that drives autonomous coding agents &#8212; tracked on a Kanban board.</text>
  </g>
</svg>
